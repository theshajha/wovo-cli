# Publish the `wovo` CLI/MCP package to npm with provenance.
#
# OWNER SETUP (one-time, required before this can run):
#   1. Create an npm account and an *automation* access token
#      (npmjs.com → Access Tokens → Generate → "Automation" — bypasses 2FA in CI).
#   2. Add it as this repo's secret `NPM_TOKEN`
#      (Settings → Secrets and variables → Actions → New repository secret).
#
# RELEASE: bump the version in package.json + CHANGELOG, commit, then push a tag:
#   git tag v0.1.0 && git push origin v0.1.0
# The tag push triggers this workflow, which publishes to npm with build
# provenance (supply-chain attestation via GitHub OIDC — works because this
# repo is public).
name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Inspect package contents
        run: npm pack --dry-run
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
